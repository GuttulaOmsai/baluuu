<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omsai</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 280px;
        }

        .nav-btn {
            position: relative;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: 700;
            /* Blue Text */
            color: #007bff;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid #007bff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* Shimmer Effect in Blue */
        .nav-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 123, 255, 0.2), transparent);
            transition: 0.6s;
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        /* Hover Interaction */
        .nav-btn:hover {
            background: #007bff;
            color: #000; /* Text turns black on hover for contrast */
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.6);
            transform: scale(1.05);
            border-color: #fff;
        }

        /* Entrance Animation */
        .nav-btn {
            animation: slideUp 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn:nth-child(1) { animation-delay: 0.1s; }
        .nav-btn:nth-child(2) { animation-delay: 0.2s; }
        .nav-btn:nth-child(3) { animation-delay: 0.3s; }
        .nav-btn:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>

    <div class="button-container">
        <button class="nav-btn" onclick="window.location.href='https://guttulaomsai.github.io/project/'">M a y i l</button>
        <button class="nav-btn" onclick="window.location.href='https://guttulaomsai.github.io/project2/'">V a i s h n a v</button>
        <button class="nav-btn" onclick="window.location.href='https://guttulaomsai.github.io/project3/'">N i t y a</button>
        <button class="nav-btn" onclick="window.location.href='https://guttulaomsai.github.io/project4/'">J a y a</button>
    </div>

</body>
</html>
