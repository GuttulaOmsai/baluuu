<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1d2671);
background-size:400% 400%;
animation:bg 12s ease infinite;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:380px;
padding:35px 25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:18px;
text-align:center;
color:#fff;
box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.lock{
font-size:55px;
margin-bottom:10px;
}

h2{
font-size:22px;
margin-bottom:8px;
}

p{
font-size:14px;
opacity:0.8;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
font-size:16px;
margin-bottom:18px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(to right,#0072ff,#00c6ff);
color:#fff;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

button:active{
transform:scale(0.98);
}

#error{
margin-top:12px;
color:#ffb3b3;
font-size:14px;
min-height:20px;
}

.footer{
margin-top:18px;
font-size:12px;
opacity:0.6;
}

/* MOBILE OPTIMIZATION */
@media (max-width:480px){

.card{
padding:28px 18px;
border-radius:14px;
}

.lock{
font-size:45px;
}

h2{
font-size:20px;
}

input,button{
font-size:15px;
padding:12px;
}
}
</style>

</head>

<body>

<div class="card">

<div class="lock">🔒</div>
<h2>Protected Access</h2>
<p>Enter password to continue</p>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Unlock</button>

<div id="error"></div>

<div class="footer">Authorized Users Only</div>

</div>

<script>

const PASSWORD = "Omsai"; // change this

function login(){
let pass = document.getElementById("password").value;

if(pass === PASSWORD){
window.location.href = "https://guttulaomsai.github.io/project/";
}else{
document.getElementById("error").innerText = "❌ Wrong password";
}
}

document.getElementById("password").addEventListener("keypress", function(e){
if(e.key === "Enter"){
login();
}
});

</script>

</body>
</html>
